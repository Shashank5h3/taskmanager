{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="
    font-family: 'Poppins', sans-serif;
    height:100vh;
    margin:0;
    background: linear-gradient(135deg, #4f46e5, #06b6d4, #22c55e);
    display:flex;
    justify-content:center;
    align-items:center;
">

<div style="
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 30px;
    width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: white;
">

    <h3 class="text-center fw-bold mb-2">Create Account</h3>
    <p class="text-center mb-4" style="opacity:0.8;">Join your team workspace</p>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            {{ form.username }}
        </div>

        <div class="mb-3">
            {{ form.email }}
        </div>

        <div class="mb-3">
            {{ form.role }}
        </div>

        <div class="mb-3">
            {{ form.password1 }}
        </div>

        <div class="mb-3">
            {{ form.password2 }}
        </div>

        <button class="btn w-100 fw-semibold" style="
            background: linear-gradient(45deg, #3b82f6, #06b6d4);
            border:none;
            color:white;
            padding:10px;
            border-radius:10px;
        ">
            Register
        </button>
    </form>

    <p class="text-center mt-3 mb-0" style="opacity:0.8;">
        Already have an account?
        <a href="/" style="color:#fff; font-weight:600; text-decoration:none;">Login</a>
    </p>

</div>

</body>
</html>
