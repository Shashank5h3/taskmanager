{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="font-family: 'Poppins', sans-serif; background:#f4f6f9;">

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#1e293b;">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">Task Manager</a>

        <div class="d-flex">
            <a href="/admin-dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="/logout/" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>


<div class="container mt-5 d-flex justify-content-center">

    <div class="card p-4 shadow-sm" style="width:500px; border-radius:15px;">

        <h3 class="mb-4 text-center fw-bold">Create New Task</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Title</label>
                {{ form.title }}
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                {{ form.description }}
            </div>

            <div class="mb-3">
                <label class="form-label">Project</label>
                {{ form.project }}
            </div>

            <div class="mb-3">
                <label class="form-label">Assign To</label>
                {{ form.assigned_to }}
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                {{ form.status }}
            </div>

            <div class="mb-3">
                <label class="form-label">Deadline</label>
                {{ form.deadline }}
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Create Task</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <a href="/admin-dashboard/" class="btn btn-outline-secondary">⬅ Back</a>
        </div>

    </div>

</div>

</body>
</html>
