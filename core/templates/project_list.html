{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Projects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="background:#f4f6f9;">

<nav class="navbar navbar-dark" style="background:#1e293b;">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">Task Manager</span>

        <div>
            <a href="/admin-dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="/create-project/" class="btn btn-success me-2">+ Project</a>
            <a href="/logout/" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4 fw-bold">Projects</h2>

    <div class="row">

        {% for project in projects %}
        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow-sm">

                <h5 class="fw-bold">{{ project.name }}</h5>
                <p class="text-muted">{{ project.description }}</p>

                <small>Created by: {{ project.created_by }}</small>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
