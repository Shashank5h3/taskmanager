{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="
    font-family: 'Poppins', sans-serif;
    height:100vh;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
">

<h1 style="color:white; font-weight:700; margin-bottom:20px; letter-spacing:1px;">
    🚀 Task Manager
</h1>

<div class="card p-4 shadow-lg" style="width:370px; border-radius:15px;">

    <h3 class="text-center mb-3 fw-bold">Welcome Back</h3>
    <p class="text-center text-muted mb-4">Login to continue</p>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

        <div class="input-group mb-3">
            <input type="password" id="loginPassword" name="password" class="form-control" placeholder="Password" required>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('loginPassword', this)">
                👁️
            </button>
        </div>

        <button class="btn btn-primary w-100 mb-2">Login</button>
    </form>

    <p class="text-center mt-3 mb-0">
        Don’t have an account? 
        <a href="/register/" class="fw-bold text-decoration-none">Register</a>
    </p>

</div>

<script>
function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    if (input.type === "password") {
        input.type = "text";
        btn.innerText = "🙈";
    } else {
        input.type = "password";
        btn.innerText = "👁️";
    }
}
</script>

</body>
</html>
