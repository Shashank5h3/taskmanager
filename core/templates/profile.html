{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9;">

<nav class="navbar navbar-dark" style="background:#1e293b;">
    <div class="container-fluid">
        <span class="navbar-brand">Task Manager</span>
        <a href="/logout/" class="btn btn-danger">Logout</a>
    </div>
</nav>

<div class="container mt-5 d-flex justify-content-center">

    <div class="card p-4 shadow" style="width:400px;">

        <h4 class="text-center mb-3">My Profile</h4>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3 text-center">
                {% if user.profile_pic %}
                    <img src="{{ user.profile_pic.url }}" width="100" class="rounded-circle">
                {% endif %}
            </div>

            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" value="{{ user.username }}" disabled>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ user.email }}">
            </div>

            <div class="mb-3">
                <label>Bio</label>
                <textarea name="bio" class="form-control">{{ user.bio }}</textarea>
            </div>

            <div class="mb-3">
                <label>Profile Picture</label>
                <input type="file" name="profile_pic" class="form-control">
            </div>

            <button class="btn btn-primary w-100">Update Profile</button>

        </form>

    </div>

</div>

</body>
</html>
