{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Update Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="
    font-family: 'Poppins', sans-serif;
    background:#f4f6f9;
    min-height:100vh;
">

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#1e293b;">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">Task Manager</a>

        <div class="d-flex">
            <a href="/member-dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="/logout/" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center mt-5">

    <div class="card p-4 shadow-sm" style="width:400px; border-radius:15px;">

        <h4 class="mb-3 fw-bold text-center">Update Task</h4>

        <p class="text-center text-muted mb-3">
            <strong>{{ task.title }}</strong>
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="pending" {% if task.status == 'pending' %}selected{% endif %}>Pending</option>
                    <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                    <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>Completed</option>
                </select>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Update Task</button>
            </div>
        </form>

    </div>

</div>

</body>
</html>
